server {
  listen 443 ssl;
  server_name mksmart.nthung.vlvn.cf;

  ssl_certificate /etc/nginx/conf.d/mksmart.nthung.vlvn.cf/mksmart.nthung.vlvn.cf.pem;
  ssl_certificate_key /etc/nginx/conf.d/mksmart.nthung.vlvn.cf/mksmart.nthung.vlvn.cf.key;

  include shared/ssl.conf;

  access_log /var/log/nginx/mksmart.access.log;

  location / {
    include shared/proxy-header.conf

    proxy_pass http://mksmart:3000;
    proxy_redirect http://mksmart:3000 https://mksmart.nthung.vlvn.cf;
  }
}
