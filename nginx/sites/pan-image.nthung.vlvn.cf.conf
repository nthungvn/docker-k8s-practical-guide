server {
  listen 443 ssl;
  server_name pan-image.nthung.vlvn.cf;
  client_max_body_size 10M;
  ssl_certificate /etc/nginx/conf.d/pan-image.nthung.vlvn.cf/pan-image.nthung.vlvn.cf.pem;
  ssl_certificate_key /etc/nginx/conf.d/pan-image.nthung.vlvn.cf/pan-image.nthung.vlvn.cf.key;

  include shared/ssl.conf;

  access_log /var/log/nginx/pan-image.access.log;

  location / {
    include shared/proxy-header.conf

    proxy_pass http://168.138.202.6:9000;
    proxy_redirect http://168.138.202.6:9000 https://pan-image.nthung.vlvn.cf;
  }
}
